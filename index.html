<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalay Lay SHINO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">
<style>

html,body{
overflow-x:hidden;
overflow-y:auto;
height:100%;
}

body{
font-family:Poppins,sans-serif;
}

.title{
font-family:"Great Vibes",cursive;
}

.glow{
box-shadow:0 0 60px rgba(255,105,180,.35);
}

.heart{
position:absolute;
animation:float linear forwards;
pointer-events:none;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(.4);
opacity:0;
}

20%{
opacity:.8;
}

100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}

}

.typing::after{
content:"|";
animation:blink .8s infinite;
}

@keyframes blink{

50%{
opacity:0;
}

}

.fade-up{

animation:fadeUp 1s ease forwards;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body class="bg-slate-950">

<div class="fixed inset-0 overflow-hidden">

<div class="absolute -left-32 top-10 h-96 w-96 rounded-full bg-pink-500 blur-[140px] opacity-30 animate-pulse"></div>

<div class="absolute right-0 bottom-0 h-96 w-96 rounded-full bg-purple-500 blur-[150px] opacity-30 animate-pulse"></div>

<div id="hearts"></div>

</div>

<div class="relative flex min-h-screen items-center justify-center p-4 sm:p-6">

<div class="glow fade-up w-full max-w-3xl rounded-[32px] sm:rounded-[40px] border border-white/10 bg-white/10 backdrop-blur-3xl p-6 sm:p-8 md:p-14">

<h1 class="title text-center text-4xl sm:text-5xl md:text-7xl text-pink-300">

Hello, SHINO!

</h1>

<div
id="typewriter"
class="typing mt-6 sm:mt-10 min-h-[180px] sm:min-h-[220px] whitespace-pre-line text-center text-base sm:text-lg leading-8 sm:leading-9 text-slate-200 md:text-xl">
</div>

<div class="mt-6 sm:mt-10 flex justify-center">

<button
id="continueBtn"
class="hidden rounded-full bg-pink-500 px-8 py-3 sm:px-10 sm:py-4 text-base sm:text-lg font-semibold text-white transition duration-300 hover:scale-105 hover:bg-pink-400">

Continue →

</button>

</div>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
